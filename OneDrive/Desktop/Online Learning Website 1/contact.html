<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f9ff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: darkblue;
            margin-top: 50px;
        }

        p {
            font-size: 18px;
            color: #333;
            margin: 10px;
        }

        .contact-box {
            background-color: lightblue;
            width: 300px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            font-size: 16px;
            color: white;
            background-color: darkblue;
            padding: 10px 15px;
            border-radius: 5px;
        }

        a:hover {
            background-color: red;
        }
    </style>

</head>

<body>

<h1>Contact Us</h1>

<div class="contact-box">
    <p>Email: test@gmail.com</p>
    <p>Phone: 1234567890</p>
</div>

<a href="index.html">Back to Home</a>

</body>
</html>
